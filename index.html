<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure - Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; }
        .unit-card { transition: all 0.3s ease; }
        .unit-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">Complete KET! 🚀</h1>
            <p class="text-gray-600 text-lg">Choose a unit to start your adventure!</p>
        </header>

        <!-- Unit Grid -->
        <div id="unit-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Unit 6 -->
            <a href="unit-6/" class="unit-card bg-white p-6 rounded-3xl shadow-md border-b-8 border-pink-400 block hover:shadow-xl">
                <div class="text-4xl mb-4">🔤</div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Unit 6: My neck, my shoulder</h3>
                <p class="text-gray-500 text-sm">Review vocab!</p>
                <div class="mt-4 inline-block bg-pink-100 text-pink-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Start Now</div>
            </a>
            
            <!-- Thêm Unit mới ở đây bằng cách copy block trên -->
        </div>

        <!-- Footer -->
        <footer class="mt-20 text-center text-gray-400 text-sm">
            <p>© 2024 Your English Classroom. Practice every day!</p>
        </footer>
    </div>
</body>
</html>
