<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }

        .char-box {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1.25rem;
            font-weight: 600;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .char-box:empty {
            background: #f8fafc;
            border-style: dashed;
        }

        .char-box.filled {
            border-color: #3b82f6;
            color: #1e40af;
            background: #eff6ff;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }

        .letter-tile {
            display: inline-flex;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            margin: 4px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 0 #1d4ed8;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .letter-tile:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        .letter-tile.used {
            opacity: 0.3;
            pointer-events: none;
            box-shadow: none;
            background: #94a3b8;
        }

        .img-container {
            width: 100%;
            max-width: 400px;
            height: 250px;
            margin: 0 auto;
            position: relative;
            background: #f1f5f9;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .emoji-fallback {
            font-size: 5rem;
        }

        .bounce-in {
            animation: bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .vibrate {
            animation: vibrate 0.2s linear infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-6 md:p-10">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center py-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-6">Vocabulary Quiz</h1>
            <p class="text-gray-600 mb-8">Test your skills! Arrange letters to match the picture.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full text-xl transition-all shadow-lg hover:shadow-xl">
                START NOW
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <!-- Header -->
            <div class="flex justify-between items-center mb-6">
                <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold">
                    Question <span id="current-index">1</span>/<span id="total-questions">0</span>
                </div>
                <div class="flex gap-4">
                    <div class="text-green-600 font-bold">✓ <span id="score-correct">0</span></div>
                    <div class="text-red-600 font-bold">✗ <span id="score-wrong">0</span></div>
                </div>
            </div>

            <!-- Content -->
            <div class="img-container mb-8 shadow-inner">
                <img id="word-image" src="" alt="Vocabulary Image" onerror="handleImageError()">
                <div id="emoji-placeholder" class="emoji-fallback hidden"></div>
            </div>

            <div class="text-center mb-8">
                <button onclick="speakWord()" class="bg-gray-100 hover:bg-gray-200 p-4 rounded-full transition-colors mb-4 inline-flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <span class="font-semibold text-gray-700">Listen</span>
                </button>
            </div>

            <!-- Target Area -->
            <div id="target-slots" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[50px]">
                <!-- Slots will be injected here -->
            </div>

            <!-- Source Area -->
            <div id="letter-source" class="flex flex-wrap justify-center gap-1 mb-8">
                <!-- Shuffled letters will be injected here -->
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center gap-4">
                <div id="feedback-msg" class="h-8 font-bold text-lg"></div>
                <div class="flex gap-4 w-full justify-center">
                    <button id="check-btn" onclick="checkAnswer()" class="w-full max-w-[200px] bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">
                        CHECK (Enter)
                    </button>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden w-full max-w-[200px] bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">
                        NEXT →
                    </button>
                </div>
                <p id="hint-msg" class="text-sm text-red-500 font-medium italic hidden"></p>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Course Completed!</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-green-50 p-6 rounded-2xl">
                    <div class="text-4xl font-bold text-green-600" id="final-correct">0</div>
                    <div class="text-sm text-green-700 uppercase tracking-wider font-semibold">Correct</div>
                </div>
                <div class="bg-red-50 p-6 rounded-2xl">
                    <div class="text-4xl font-bold text-red-600" id="final-wrong">0</div>
                    <div class="text-sm text-red-700 uppercase tracking-wider font-semibold">Errors Made</div>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full text-xl transition-all">
                TRY AGAIN
            </button>
        </div>
    </div>

    <script>
        const vocabularyData = [
            { word: "Fur", image: "https://cdn.troutline.ro/media/catalog/product/cache/3/small_image/57d39829afd9da0a90b25ac8e1388bac/c/r/craft-fur-medium-brown-raccoon-troutline-shop-trout-flies_2.jpg?q=80&w=800&auto=format&fit=crop", emoji: "🧸" },
            { word: "Clever", image: "https://yourhomework.net/yhw/f/yhw-voca/2024/07/2/202407240906018000451.jpg?q=80&w=800&auto=format&fit=crop", emoji: "💡" },
            { word: "Dangerous", image: "https://assets-au-scc.kc-usercontent.com/330b87ea-148b-3ecf-9857-698f2086fe8d/0b15c31e-1123-4e1a-aa15-18906995dda6/Regulated%20dogs_Menacing%20dog%20barking_2025.jpeg?q=80&w=800&auto=format&fit=crop", emoji: "⚠️" },
            { word: "Naughty", image: "https://images.unsplash.com/photo-1473280025148-641f341e7f06?q=80&w=800&auto=format&fit=crop", emoji: "👿" },
            { word: "Dry", image: "https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?q=80&w=800&auto=format&fit=crop", emoji: "🌵" },
            { word: "Wet", image: "https://images.unsplash.com/photo-1534274988757-a28bf1f539cf?q=80&w=800&auto=format&fit=crop", emoji: "☔" },
            { word: "Today", image: "https://us.123rf.com/450wm/mitay20/mitay201303/mitay20130300001/18438281-ilustraci%C3%B3n-del-icono-detallado-calendario-hermoso.jpg?ver=6?q=80&w=800&auto=format&fit=crop", emoji: "📅" },
            { word: "Yesterday", image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQF9yWcrowbECsVCwWIuxUsVZxADPYUCOASuw&s?q=80&w=800&auto=format&fit=crop", emoji: "⏪" },
            { word: "Hippo", image: "https://images.unsplash.com/photo-1563294334-972178229c1b?q=80&w=800&auto=format&fit=crop", emoji: "🦛" },
            { word: "Polar bear", image: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?q=80&w=800&auto=format&fit=crop", emoji: "🐻‍❄️" },
            { word: "Hottest", image: "https://images.unsplash.com/photo-1504370805625-d32c54b16100?q=80&w=800&auto=format&fit=crop", emoji: "☀️" },
            { word: "Coldest", image: "https://images.unsplash.com/photo-1478265409131-1f65c88f965c?q=80&w=800&auto=format&fit=crop", emoji: "❄️" }
        ];

        let questions = [];
        let currentIndex = 0;
        let score = { correct: 0, wrong: 0 };
        let currentAnswer = [];
        let attempts = 0;
        const maxAttempts = 3;
        let isGameStarted = false;

        const synth = window.speechSynthesis;
        const correctSound = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb63084370.mp3?filename=success-1-6297.mp3');
        const wrongSound = new Audio('https://cdn.pixabay.com/download/audio/2022/03/10/audio_c97e974e62.mp3?filename=error-2-126514.mp3');

        function startGame() {
            questions = [...vocabularyData].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            score = { correct: 0, wrong: 0 };
            isGameStarted = true;
            document.getElementById('total-questions').innerText = questions.length;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (!questions[currentIndex]) return;
            const data = questions[currentIndex];
            attempts = 0;
            
            // Handle words with spaces (like "Polar bear")
            const cleanWord = data.word.replace(/\s/g, '').toUpperCase();
            currentAnswer = new Array(cleanWord.length).fill(null);
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('feedback-msg').innerText = '';
            document.getElementById('hint-msg').classList.add('hidden');
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('score-correct').innerText = score.correct;
            document.getElementById('score-wrong').innerText = score.wrong;

            const imgEl = document.getElementById('word-image');
            const emojiEl = document.getElementById('emoji-placeholder');
            
            imgEl.src = "";
            imgEl.classList.remove('hidden');
            emojiEl.classList.add('hidden');
            imgEl.src = data.image;

            renderSlots();
            renderLetters();
            
            setTimeout(() => speakWord(), 500);
        }

        function handleImageError() {
            if (!isGameStarted || !questions || !questions[currentIndex]) return;
            const data = questions[currentIndex];
            const imgEl = document.getElementById('word-image');
            const emojiEl = document.getElementById('emoji-placeholder');
            imgEl.classList.add('hidden');
            emojiEl.innerText = data.emoji || "❓";
            emojiEl.classList.remove('hidden');
        }

        function renderSlots() {
            const container = document.getElementById('target-slots');
            container.innerHTML = '';
            currentAnswer.forEach((char, idx) => {
                const slot = document.createElement('div');
                slot.className = `char-box ${char ? 'filled' : ''}`;
                slot.innerText = char || '';
                slot.onclick = () => removeLetter(idx);
                container.appendChild(slot);
            });
        }

        function renderLetters() {
            if (!questions[currentIndex]) return;
            const data = questions[currentIndex];
            const container = document.getElementById('letter-source');
            container.innerHTML = '';
            
            const rawLetters = data.word.replace(/\s/g, '').split('');
            const shuffled = rawLetters.map((l, i) => ({ l, i })).sort(() => Math.random() - 0.5);

            shuffled.forEach(item => {
                const tile = document.createElement('button');
                tile.className = 'letter-tile';
                tile.innerText = item.l.toUpperCase();
                tile.onclick = () => selectLetter(item.l.toUpperCase(), tile);
                container.appendChild(tile);
            });
        }

        function selectLetter(char, tileElement) {
            const firstEmptyIndex = currentAnswer.findIndex(c => c === null);
            if (firstEmptyIndex !== -1) {
                currentAnswer[firstEmptyIndex] = char;
                tileElement.classList.add('used');
                renderSlots();
            }
        }

        function removeLetter(index) {
            const char = currentAnswer[index];
            if (!char) return;

            currentAnswer[index] = null;
            const tiles = document.querySelectorAll('.letter-tile.used');
            for (let tile of tiles) {
                if (tile.innerText === char) {
                    tile.classList.remove('used');
                    break;
                }
            }
            renderSlots();
        }

        function speakWord() {
            if (!isGameStarted || !questions[currentIndex]) return;
            const data = questions[currentIndex];
            const utterance = new SpeechSynthesisUtterance(data.word);
            utterance.lang = 'en-US';
            utterance.rate = 0.7;
            
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google US English'));
            if (femaleVoice) utterance.voice = femaleVoice;
            
            synth.speak(utterance);
        }

        function checkAnswer() {
            if (!questions[currentIndex]) return;
            const data = questions[currentIndex];
            const targetWord = data.word.replace(/\s/g, '').toUpperCase();
            const userWord = currentAnswer.join('');

            if (userWord === targetWord) {
                handleSuccess();
            } else {
                handleFailure();
            }
        }

        function handleSuccess() {
            score.correct++;
            correctSound.play().catch(() => {});
            
            const praises = ["Well done!", "Good job!", "Excellent!", "Very good!"];
            const msg = praises[Math.floor(Math.random() * praises.length)];
            
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = msg;
            feedback.className = "h-8 font-bold text-lg text-green-600 bounce-in";
            
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('next-btn').focus();
            
            document.querySelectorAll('.char-box').forEach(b => b.classList.add('bg-green-100', 'border-green-500', 'text-green-700'));
        }

        function handleFailure() {
            attempts++;
            score.wrong++;
            wrongSound.play().catch(() => {});
            
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = "Try again!";
            feedback.className = "h-8 font-bold text-lg text-red-600 vibrate";
            
            setTimeout(() => {
                currentAnswer = new Array(currentAnswer.length).fill(null);
                document.querySelectorAll('.letter-tile').forEach(t => t.classList.remove('used'));
                renderSlots();
                
                if (attempts >= maxAttempts) {
                    const hint = document.getElementById('hint-msg');
                    hint.innerText = `Hint: The word is "${questions[currentIndex].word.toUpperCase()}"`;
                    hint.classList.remove('hidden');
                }
            }, 800);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-correct').innerText = score.correct;
            document.getElementById('final-wrong').innerText = score.wrong;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const nextBtn = document.getElementById('next-btn');
                const checkBtn = document.getElementById('check-btn');
                
                if (!nextBtn.classList.contains('hidden')) {
                    nextQuestion();
                } else if (!checkBtn.classList.contains('hidden')) {
                    checkAnswer();
                }
            }
        });

        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
